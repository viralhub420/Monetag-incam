<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viral Video Hub Premium</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script src='//libtl.com/sdk.js' data-zone='10500197' data-sdk='show_10500197'></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body { background-color: #0b0c10; color: #ffffff; font-family: 'Segoe UI', Roboto, sans-serif; user-select: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-4">

<div id="home-page">
    <div class="flex justify-between items-center mb-5">
        <h1 class="text-2xl font-bold text-yellow-400 tracking-wide uppercase flex items-center gap-2">
            Viral Hub <i class="fa fa-play-circle text-red-500"></i>
        </h1>
        <button class="text-yellow-400 text-lg border border-yellow-500/30 rounded-md w-10 h-10 flex items-center justify-center bg-[#12131a]">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <div class="relative mb-5">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500">
            <i class="fa-solid fa-magnifying-glass"></i>
        </span>
        <input type="text" id="search-input" onkeyup="searchMovies()" placeholder="Search videos..." class="w-full bg-[#14151f] text-white pl-10 pr-4 py-2.5 rounded-lg border border-gray-800 focus:outline-none focus:border-yellow-500/50 transition text-sm">
    </div>

    <div id="movie-list" class="grid grid-cols-2 gap-3"></div>
</div>

<div id="player-modal" class="fixed inset-0 bg-black/90 z-50 hidden flex flex-col justify-end">
    <div class="bg-[#12131a] w-full rounded-t-3xl max-h-[90vh] flex flex-col overflow-y-auto no-scrollbar">
        
        <div class="flex justify-between items-center p-4 border-b border-gray-900">
            <span class="text-yellow-400 font-bold text-sm">Video Player</span>
            <button onclick="closePlayer()" class="bg-red-600 text-white text-xs px-4 py-1.5 rounded-lg font-bold">বন্ধ করুন</button>
        </div>

        <div class="p-4 flex flex-col items-center">
            <h2 class="text-xl font-bold text-[#4da6ff] mb-4 tracking-wider uppercase">VIRAL VIDEO PRO</h2>
            
            <div class="w-full bg-black rounded-2xl border border-gray-800 overflow-hidden relative aspect-video flex items-center justify-center mb-2">
                <video id="main-video-player" controls class="w-full h-full">
                    <source src="" type="video/mp4">
                </video>
            </div>
            <p class="text-xs text-gray-400 mb-4 flex items-center gap-1">
                <i class="fa-solid fa-circle-info text-yellow-500"></i> ভিডিও লোড হতে ১-১৫ সেকেন্ড সময় নিবে
            </p>

            <button id="modal-watch-btn" class="w-full bg-[#22c55e] text-white font-bold py-3.5 rounded-xl shadow-[0_0_15px_rgba(34,197,94,0.4)] flex items-center justify-center gap-2 active:scale-98 transition mb-3">
                <i class="fa-solid fa-play"></i> WATCH FULL VIDEO
            </button>
            
            <p class="text-[10px] text-gray-500 tracking-wide mb-4">🚀 ULTRA FAST STREAMING SERVER</p>
        </div>

        <div class="bg-[#0f1016] p-4 border-t border-gray-900 rounded-t-2xl flex-1">
            <h3 class="text-xs font-bold text-gray-400 mb-3 flex items-center gap-1.5">
                <i class="fa-solid fa-comments text-purple-400"></i> কমেন্ট সেকশন (<span id="comment-count">0</span>)
            </h3>
            
            <div class="flex flex-col gap-2 mb-4">
                <input type="text" id="comment-name" placeholder="আপনার নাম..." class="bg-[#14151f] text-white text-xs p-2.5 rounded-lg border border-gray-800 focus:outline-none">
                <div class="flex gap-2">
                    <input type="text" id="comment-text" placeholder="একটি কমেন্ট লিখুন..." class="flex-1 bg-[#14151f] text-white text-xs p-2.5 rounded-lg border border-gray-800 focus:outline-none">
                    <button onclick="submitComment()" class="bg-purple-600 hover:bg-purple-700 text-white px-4 rounded-lg text-xs font-bold"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>

            <div id="comments-box" class="space-y-3 max-h-48 overflow-y-auto pr-1">
                </div>
        </div>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();

const firebaseConfig = { databaseURL: "https://movie-hud-default-rtdb.asia-southeast1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const MONETAG_SMARTLINK = "https://omg10.com/4/10611800";
let adProgress = JSON.parse(localStorage.getItem('user_ad_progress')) || {};
let allMoviesData = [];
let currentMovieId = null;

function loadMovies() {
    db.ref('movies').on('value', (snapshot) => {
        allMoviesData = [];
        const list = document.getElementById('movie-list');
        list.innerHTML = '';
        if (!snapshot.exists()) {
            list.innerHTML = '<div class="col-span-2 text-center py-10 text-gray-500 text-sm">কোনো ভিডিও পাওয়া যায়নি!</div>';
            return;
        }
        snapshot.forEach((child) => {
            const movie = child.val();
            movie.id = child.key;
            allMoviesData.push(movie);
        });
        renderMovieGrid(allMoviesData);
    });
}

function renderMovieGrid(movies) {
    const list = document.getElementById('movie-list');
    list.innerHTML = '';
    movies.forEach((movie) => {
        const id = movie.id;
        if(!adProgress[id]) adProgress[id] = 0;
        const isUnlocked = adProgress[id] >= 5;
        
        const btnText = isUnlocked ? `<i class="fa-solid fa-play"></i> WATCH NOW` : `<i class="fa-solid fa-lock"></i> UNLOCK (${adProgress[id]}/5)`;
        const btnClass = isUnlocked 
            ? "flex-1 bg-red-600 text-white text-[10px] font-bold py-2 rounded-lg flex items-center justify-center gap-1 active:scale-95 transition" 
            : "flex-1 bg-[#1a1b24] text-gray-400 border border-gray-800 text-[10px] font-bold py-2 rounded-lg flex items-center justify-center gap-1 active:scale-95 transition";
        
        const fakeViews = movie.views || (Math.random() * (30 - 3) + 3).toFixed(2) + "K";

        list.innerHTML += `
        <div class="bg-[#12131a] rounded-xl overflow-hidden border border-gray-900 shadow-md flex flex-col justify-between">
            <div class="relative h-44 bg-gray-900 flex items-center justify-center overflow-hidden">
                <img src="${movie.image_url || 'https://via.placeholder.com/400x220'}" alt="Poster" class="w-full h-full object-cover ${isUnlocked ? 'opacity-80' : 'opacity-50'}">
                <div class="absolute inset-0 flex items-center justify-center">
                    ${isUnlocked 
                        ? `<button class="bg-white text-black w-9 h-9 rounded-full flex items-center justify-center text-xs shadow-lg"><i class="fa-solid fa-play ml-0.5"></i></button>`
                        : `<div class="text-yellow-500 text-xl drop-shadow-md"><i class="fa-solid fa-lock"></i></div>`
                    }
                </div>
                <span class="absolute bottom-2 right-2 bg-black/75 text-[10px] px-1.5 py-0.5 rounded text-gray-300 flex items-center gap-1">
                    <i class="fa-regular fa-eye text-gray-400"></i> ${fakeViews}
                </span>
            </div>
            <div class="p-2.5">
                <h3 class="text-xs font-medium text-gray-200 line-clamp-1 mb-2.5">${movie.title}</h3>
                <div class="flex gap-1.5">
                    <button class="${btnClass}" onclick="handleUnlock('${id}', '${movie.video_url}')" id="btn-${id}">
                        ${btnText}
                    </button>
                    <button class="bg-yellow-500 text-black w-8 h-8 rounded-lg flex items-center justify-center text-xs font-bold active:scale-95 transition shadow">
                        <i class="fa-solid fa-crown"></i>
                    </button>
                </div>
            </div>
        </div>`;
    });
}

function searchMovies() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const filtered = allMoviesData.filter(movie => movie.title.toLowerCase().includes(query));
    renderMovieGrid(filtered);
}

async function handleUnlock(id, url) {
    const btn = document.getElementById(`btn-${id}`);
    
    // যদি অলরেডি ৫টি অ্যাড দেখা শেষ হয়ে থাকে, তবে ৩ নম্বর স্ক্রিনশটের মতো প্লেয়ার পপ-আপ চালু হবে
    if(adProgress[id] >= 5) {
        openPlayer(id, url);
        return;
    }

    btn.disabled = true;
    if (typeof show_10500197 === 'function') {
        show_10500197().catch(() => { window.open(MONETAG_SMARTLINK, '_blank'); });
    } else {
        window.open(MONETAG_SMARTLINK, '_blank');
    }

    let timeLeft = 15;
    const countdown = setInterval(() => {
        timeLeft--;
        btn.innerHTML = `<i class="fa fa-spinner fa-spin"></i> ভেরিফাই... ${timeLeft}s`;
        if(timeLeft <= 0) {
            clearInterval(countdown);
            adProgress[id]++;
            localStorage.setItem('user_ad_progress', JSON.stringify(adProgress));
            btn.disabled = false;
            loadMovies(); 
            tg.HapticFeedback.notificationOccurred('success');
        }
    }, 1000);
}

// 🎬 প্লেয়ার এবং কমেন্ট বক্স ওপেন করার ফাংশন
function openPlayer(id, videoUrl) {
    currentMovieId = id;
    document.getElementById('player-modal').classList.remove('hidden');
    
    // ভিডিও ইউআরএল সেট করা
    const video = document.getElementById('main-video-player');
    video.src = videoUrl;
    video.load();
    
    // ওয়াচ ফুল ভিডিও বাটনে অ্যাকশন সেট করা
    document.getElementById('modal-watch-btn').onclick = function() {
        window.location.href = videoUrl;
    };

    // ফায়ারবেজ থেকে এই ভিডিওর কমেন্টগুলো লাইভ লোড করা
    loadComments(id);
}

function closePlayer() {
    const video = document.getElementById('main-video-player');
    video.pause();
    video.src = "";
    document.getElementById('player-modal').classList.add('hidden');
    currentMovieId = null;
}

// 💬 ফায়ারবেজ থেকে কমেন্ট লোড করার ফাংশন
function loadComments(movieId) {
    db.ref(`comments/${movieId}`).on('value', (snapshot) => {
        const box = document.getElementById('comments-box');
        const countSpan = document.getElementById('comment-count');
        box.innerHTML = '';
        
        if (!snapshot.exists()) {
            box.innerHTML = '<p class="text-[11px] text-gray-600 text-center py-4">কোনো কমেন্ট নেই। প্রথম কমেন্টটি আপনি করুন!</p>';
            countSpan.innerText = "0";
            return;
        }

        let count = 0;
        snapshot.forEach((child) => {
            const c = child.val();
            count++;
            box.innerHTML = `
                <div class="bg-[#14151f] p-2.5 rounded-lg border border-gray-900">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-xs text-yellow-500 font-semibold">${c.name}</span>
                        <span class="text-[9px] text-gray-500">জাস্ট এখন</span>
                    </div>
                    <p class="text-xs text-gray-300">${c.text}</p>
                </div>
            ` + box.innerHTML; // নতুন কমেন্ট উপরে দেখাবে
        });
        countSpan.innerText = count;
    });
}

// 📝 নতুন কমেন্ট সাবমিট করার ফাংশন
function submitComment() {
    const nameInput = document.getElementById('comment-name');
    const textInput = document.getElementById('comment-text');
    
    const name = nameInput.value.trim() || "Anonymous";
    const text = textInput.value.trim();
    
    if(!text) return;

    // ফায়ারবেজে কমেন্ট পুশ করা
    db.ref(`comments/${currentMovieId}`).push({
        name: name,
        text: text,
        timestamp: Date.now()
    });

    textInput.value = ''; // ইনপুট বক্স ক্লিয়ার করা
    tg.HapticFeedback.impactOccurred('light');
}

window.onload = () => {
    loadMovies();
    setTimeout(() => { if(typeof show_10500197 === 'function') show_10500197(); }, 30000);
};
</script>
</body>
</html>
